<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mason's Scholarship Dashboard</title>
<style>
  .viz-root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6; /* blue - howard/hbcu */
    --series-2:       #1baf7a; /* aqua - nj resident */
    --series-3:       #4a3aa7; /* violet - finance major */
    --series-4:       #eb6834; /* orange - general */
    --status-good:     #0ca30c;
    --status-warning:  #fab219;
    --status-serious:  #ec835a;
    --status-critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --series-1:       #3987e5;
      --series-2:       #199e70;
      --series-3:       #9085e9;
      --series-4:       #d95926;
      --status-good:     #0ca30c;
      --status-warning:  #fab219;
      --status-serious:  #ec835a;
      --status-critical: #d03b3b;
    }
  }
  :root[data-theme="dark"] .viz-root {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --page:           #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --border:         rgba(255,255,255,0.10);
    --series-1:       #3987e5;
    --series-2:       #199e70;
    --series-3:       #9085e9;
    --series-4:       #d95926;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

  header.page-head { margin-bottom: 24px; }
  header.page-head h1 { font-size: 1.6rem; margin: 0 0 4px; }
  header.page-head .sub { color: var(--text-secondary); font-size: 0.95rem; }
  header.page-head .profile {
    margin-top: 12px; font-size: 0.85rem; color: var(--text-muted);
    display: flex; flex-wrap: wrap; gap: 6px 16px;
  }
  header.page-head .profile b { color: var(--text-secondary); font-weight: 600; }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-tile {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-tile .value {
    font-size: 1.7rem;
    font-weight: 600;
    font-variant-numeric: proportional-nums;
  }
  .stat-tile .label { color: var(--text-secondary); font-size: 0.8rem; margin-top: 2px; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 18px;
  }
  .chip {
    border: 1px solid var(--border);
    background: var(--surface-1);
    color: var(--text-secondary);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    user-select: none;
  }
  .chip[aria-pressed="true"] {
    background: var(--series-1);
    border-color: var(--series-1);
    color: #fff;
  }

  .card-list { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; flex-wrap: wrap;
  }
  .card-top h2 { font-size: 1.05rem; margin: 0; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    color: var(--text-secondary);
    background: var(--gridline);
    white-space: nowrap;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.75rem; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    white-space: nowrap;
    border: 1px solid var(--border);
  }
  .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-critical .dot { background: var(--status-critical); }
  .status-critical { color: var(--status-critical); }
  .status-serious .dot { background: var(--status-serious); }
  .status-serious { color: var(--status-serious); }
  .status-warning .dot { background: var(--status-warning); }
  .status-warning { color: #9a6b00; }
  .status-good .dot { background: var(--status-good); }
  .status-good { color: var(--status-good); }
  .status-unknown .dot { background: var(--text-muted); }
  .status-unknown { color: var(--text-muted); }

  .card p.desc { color: var(--text-secondary); font-size: 0.92rem; margin: 10px 0; }
  .card .reqs { margin: 10px 0; padding-left: 18px; color: var(--text-secondary); font-size: 0.88rem; }
  .card .reqs li { margin-bottom: 3px; }
  .card-bottom {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gridline);
    flex-wrap: wrap; gap: 10px;
  }
  .deadline-text { font-size: 0.85rem; color: var(--text-secondary); }
  .deadline-text b { color: var(--text-primary); }
  .apply-link {
    font-size: 0.85rem; font-weight: 600;
    color: var(--series-1); text-decoration: none;
    border: 1px solid var(--series-1);
    padding: 6px 14px; border-radius: 8px;
  }
  .apply-link:hover { background: var(--series-1); color: #fff; }

  footer.meta {
    margin-top: 32px; font-size: 0.78rem; color: var(--text-muted);
    border-top: 1px solid var(--gridline); padding-top: 14px;
  }
  .empty-state { color: var(--text-muted); padding: 40px 0; text-align: center; }
</style>
</head>
<body>

<div class="viz-root">
  <div class="wrap">
    <header class="page-head">
      <h1>Mason's Scholarship Dashboard</h1>
      <div class="sub">Scholarships matched to Mason's profile, refreshed daily.</div>
      <div class="profile" id="profile-line"></div>
    </header>

    <div class="stat-row" id="stat-row"></div>

    <div class="controls" id="controls"></div>

    <div class="card-list" id="card-list"></div>

    <footer class="meta" id="meta-footer"></footer>
  </div>
</div>

<script>
const CATEGORY_LABELS = {
  "howard-hbcu": "Howard / HBCU",
  "black-finance": "Black in Finance/Business",
  "nj-resident": "NJ Resident",
  "finance-major": "Finance/Business Major",
  "general": "General"
};
const CATEGORY_COLOR_VAR = {
  "howard-hbcu": "--series-1",
  "black-finance": "--series-3",
  "nj-resident": "--series-2",
  "finance-major": "--series-3",
  "general": "--series-4"
};

let allScholarships = [];
let activeFilter = "all";

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + "T00:00:00");
  return Math.round((d - today) / 86400000);
}

function statusForDeadline(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return { cls: "unknown", label: "Check site" };
  if (days < 0) return { cls: "unknown", label: "Past — check for new cycle" };
  if (days <= 14) return { cls: "critical", label: `${days}d left` };
  if (days <= 30) return { cls: "serious", label: `${days}d left` };
  if (days <= 60) return { cls: "warning", label: `${days}d left` };
  return { cls: "good", label: `${days}d left` };
}

function fmtDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function render() {
  const list = document.getElementById("card-list");
  const filtered = activeFilter === "all"
    ? allScholarships
    : allScholarships.filter(s => s.category === activeFilter);

  const sorted = [...filtered].sort((a, b) => {
    const da = daysUntil(a.deadline);
    const db = daysUntil(b.deadline);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state">No scholarships in this category yet.</div>';
    return;
  }

  list.innerHTML = sorted.map(s => {
    const status = statusForDeadline(s.deadline);
    const deadlineDisplay = s.deadline
      ? `<b>${fmtDate(s.deadline)}</b>`
      : (s.deadlineNote ? `<b>${s.deadlineNote}</b>` : "<b>Check site</b>");
    const catVar = CATEGORY_COLOR_VAR[s.category] || "--series-4";
    return `
      <div class="card">
        <div class="card-top">
          <h2>${s.organization}</h2>
          <div class="badges">
            <span class="badge" style="color:var(${catVar})">${CATEGORY_LABELS[s.category] || s.category}</span>
            <span class="status-pill status-${status.cls}"><span class="dot"></span>${status.label}</span>
          </div>
        </div>
        <p class="desc">${s.description}</p>
        ${s.requirements && s.requirements.length ? `<ul class="reqs">${s.requirements.map(r => `<li>${r}</li>`).join("")}</ul>` : ""}
        <div class="card-bottom">
          <div class="deadline-text">Deadline: ${deadlineDisplay}${s.deadlineNote && s.deadline ? ` <span style="color:var(--text-muted)">(${s.deadlineNote})</span>` : ""}</div>
          <a class="apply-link" href="${s.applyUrl}" target="_blank" rel="noopener">Apply →</a>
        </div>
      </div>
    `;
  }).join("");
}

function renderStats() {
  const total = allScholarships.length;
  const closing30 = allScholarships.filter(s => {
    const d = daysUntil(s.deadline);
    return d !== null && d >= 0 && d <= 30;
  }).length;
  const nj = allScholarships.filter(s => s.category === "nj-resident").length;
  const howard = allScholarships.filter(s => s.category === "howard-hbcu").length;

  document.getElementById("stat-row").innerHTML = `
    <div class="stat-tile"><div class="value">${total}</div><div class="label">Total scholarships tracked</div></div>
    <div class="stat-tile"><div class="value" style="color:var(--status-critical)">${closing30}</div><div class="label">Closing within 30 days</div></div>
    <div class="stat-tile"><div class="value" style="color:var(--series-2)">${nj}</div><div class="label">NJ-resident specific</div></div>
    <div class="stat-tile"><div class="value" style="color:var(--series-1)">${howard}</div><div class="label">Howard / HBCU specific</div></div>
  `;
}

function renderControls() {
  const cats = ["all", ...Object.keys(CATEGORY_LABELS)];
  document.getElementById("controls").innerHTML = cats.map(c => `
    <button class="chip" data-cat="${c}" aria-pressed="${c === activeFilter}">
      ${c === "all" ? "All" : CATEGORY_LABELS[c]}
    </button>
  `).join("");
  document.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      activeFilter = btn.dataset.cat;
      document.querySelectorAll(".chip").forEach(b => b.setAttribute("aria-pressed", b === btn));
      render();
    });
  });
}

fetch("data/scholarships.json?t=" + Date.now())
  .then(r => r.json())
  .then(data => {
    allScholarships = data.scholarships || [];
    const p = data.student || {};
    document.getElementById("profile-line").innerHTML = `
      <span><b>Student:</b> ${p.name || ""}</span>
      <span><b>School:</b> ${p.school || ""}</span>
      <span><b>Major:</b> ${p.major || ""}</span>
      <span><b>GPA:</b> ${p.gpa || ""}</span>
      <span><b>Hometown:</b> ${p.hometown || ""}</span>
      <span><b>Year:</b> ${p.year || ""}</span>
    `;
    document.getElementById("meta-footer").innerText =
      `Last refreshed: ${data.generatedAt ? new Date(data.generatedAt).toLocaleString() : "unknown"}. ` +
      `Deadlines and links are best-effort — always confirm on the organization's official site before applying.`;
    renderStats();
    renderControls();
    render();
  })
  .catch(err => {
    document.getElementById("card-list").innerHTML =
      `<div class="empty-state">Couldn't load scholarship data (${err}). Make sure data/scholarships.json exists.</div>`;
  });
</script>
</body>
</html>
